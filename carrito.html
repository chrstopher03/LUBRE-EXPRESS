<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carrito | LUBRI EXPRES</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

:root{
--rojo:#c40000;
--rojo2:#8b0000;
--amarillo:#f7c600;
--gris:#f5f5f5;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:var(--gris);
padding-bottom:90px;
}

.header{
background:var(--rojo);
color:white;
padding:20px;
text-align:center;
position:sticky;
top:0;
z-index:100;
}

.container{
padding:20px;
max-width:1000px;
margin:auto;
}

.producto{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:20px;
display:flex;
align-items:center;
gap:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
transition:.3s;
}

.producto:hover{
transform:translateY(-3px);
}

.producto-img{
width:100px;
height:100px;
object-fit:cover;
border-radius:15px;
background:#eee;
}

.info{
flex:1;
}

.info h3{
margin-bottom:5px;
font-size:18px;
}

.info p{
color:#666;
margin-bottom:5px;
}

.cantidad-box{
display:flex;
align-items:center;
gap:10px;
margin-top:10px;
}

.qty-btn{
width:35px;
height:35px;
border:none;
border-radius:10px;
background:var(--rojo);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.qty-btn:hover{
background:var(--rojo2);
}

.eliminar{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#ff4444;
color:white;
cursor:pointer;
font-size:18px;
transition:.3s;
}

.eliminar:hover{
background:#d90000;
}

.vacio{
text-align:center;
padding:80px 20px;
color:#666;
}

.resumen{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
margin-top:20px;
}

.total{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
color:var(--rojo);
}

.botones{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
flex:1;
padding:15px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:translateY(-2px);
}

.whatsapp{
background:#25D366;
color:white;
}

.vaciar{
background:#ff4444;
color:white;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:75px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 20px rgba(0,0,0,.08);
}

.nav-item{
background:none;
border:none;
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
font-size:12px;
color:#666;
cursor:pointer;
}

.nav-item i{
font-size:22px;
}

.active{
color:var(--rojo);
}

.cart-icon{
position:relative;
}

.cart-badge{
position:absolute;
top:-8px;
right:-10px;
background:red;
color:white;
width:20px;
height:20px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:11px;
font-weight:bold;
}

</style>

</head>
<body>

<header class="header">
<h1>Mi Carrito</h1>
</header>

<div class="container">

<div id="listaCarrito"></div>

<div id="resumen"></div>

</div>

<nav class="bottom-nav">

<button
class="nav-item"
onclick="window.location.href='index.html'">

<i class="fa-solid fa-house"></i>
<span>Inicio</span>

</button>

<button
class="nav-item"
onclick="window.location.href='catalogo.html'">

<i class="fa fa-box"></i>
<span>Catálogo</span>

</button>

<button
class="nav-item active"
onclick="window.location.href='carrito.html'">

<div class="cart-icon">

<i class="fa-solid fa-cart-shopping"></i>

<span
id="cartCount"
class="cart-badge">
0
</span>

</div>

<span>Carrito</span>

</button>

</nav>
<script>

let carrito =
JSON.parse(localStorage.getItem("carrito")) || [];

const lista =
document.getElementById("listaCarrito");

const resumen =
document.getElementById("resumen");

function cargarCarrito(){

lista.innerHTML = "";
resumen.innerHTML = "";

if(carrito.length === 0){

lista.innerHTML = `
<div class="vacio">
<h2>Carrito vacío</h2>
<p>No has agregado productos todavía.</p>
</div>
`;

actualizarBadge();
return;

}

let totalProductos = 0;

carrito.forEach((item,index)=>{

totalProductos += Number(item.cantidad);

lista.innerHTML += `

<div class="producto">

<img
class="producto-img"
src="${item.imagen}"
alt="${item.nombre}">

<div class="info">

<h3>${item.nombre}</h3>

<div class="cantidad-box">

<button
class="qty-btn"
onclick="cambiarCantidad(${index},-1)">
-
</button>

<b>${item.cantidad}</b>

<button
class="qty-btn"
onclick="cambiarCantidad(${index},1)">
+
</button>

</div>

</div>

<button
class="eliminar"
onclick="eliminar(${index})">

<i class="fa-solid fa-trash"></i>

</button>

</div>

`;

});

resumen.innerHTML = `

<div class="resumen">

<div class="total">
Total productos: ${totalProductos}
</div>

<div class="botones">

<button
class="btn whatsapp"
onclick="enviarWhatsApp()">

<i class="fa-brands fa-whatsapp"></i>
Enviar Pedido

</button>

<button
class="btn vaciar"
onclick="vaciarCarrito()">

Vaciar Carrito

</button>

</div>

</div>

`;

actualizarBadge();

}

function cambiarCantidad(index,cambio){

carrito[index].cantidad =
Number(carrito[index].cantidad) + cambio;

if(carrito[index].cantidad <= 0){
carrito.splice(index,1);
}

localStorage.setItem(
"carrito",
JSON.stringify(carrito)
);

cargarCarrito();

Swal.fire({
toast:true,
position:"top-end",
icon:"success",
title:"Cantidad actualizada",
showConfirmButton:false,
timer:1200
});

}

function eliminar(index){

Swal.fire({
title:"¿Eliminar producto?",
text:"Se quitará del carrito",
icon:"warning",
showCancelButton:true,
confirmButtonColor:"#c40000",
cancelButtonColor:"#6c757d",
confirmButtonText:"Sí, eliminar",
cancelButtonText:"Cancelar"
}).then((result)=>{

if(result.isConfirmed){

carrito.splice(index,1);

localStorage.setItem(
"carrito",
JSON.stringify(carrito)
);

cargarCarrito();

Swal.fire({
icon:"success",
title:"Producto eliminado",
showConfirmButton:false,
timer:1500
});

}

});

}

function vaciarCarrito(){

Swal.fire({
title:"¿Vaciar carrito?",
text:"Todos los productos serán eliminados",
icon:"warning",
showCancelButton:true,
confirmButtonColor:"#c40000",
cancelButtonColor:"#6c757d",
confirmButtonText:"Sí, vaciar",
cancelButtonText:"Cancelar"
}).then((result)=>{

if(result.isConfirmed){

localStorage.removeItem("carrito");

carrito = [];

cargarCarrito();

Swal.fire({
icon:"success",
title:"Carrito vaciado",
showConfirmButton:false,
timer:1500
});

}

});

}

function actualizarBadge(){

let total = 0;

carrito.forEach(item=>{
total += Number(item.cantidad);
});

const badge =
document.getElementById("cartCount");

if(badge){

badge.textContent = total;

badge.style.display =
total > 0 ? "flex" : "none";

}

}



function enviarWhatsApp() {

  const now = new Date();

  const fecha =
    `${now.getDate()}/${now.getMonth() + 1}/${now.getFullYear()}`;

  const hora =
    now.toLocaleTimeString('es-NI', {
      hour: 'numeric',
      minute: '2-digit',
      second: '2-digit',
      hour12: true
    });

  let mensaje = `🚗 LUBRI EXPRES%0A`;

  mensaje += `--------------------------------%0A`;
  mensaje += `Fecha: ${fecha}%0A`;
  mensaje += `Hora : ${hora}%0A`;
  mensaje += `--------------------------------%0A`;
  mensaje += `Producto              Cantidad%0A`;
  mensaje += `--------------------------------%0A`;

  let total = 0;

  carrito.forEach(item => {

    mensaje += `${item.nombre}  x${item.cantidad}%0A`;

    total += Number(item.cantidad);

  });

  mensaje += `--------------------------------%0A`;

  mensaje += `📦 Total productos: ${total}%0A`;

  mensaje += `--------------------------------%0A%0A`;

  mensaje += `Hola, deseo realizar este pedido y consultar disponibilidad.`;

  Swal.fire({
    icon: "success",
    title: "Abriendo WhatsApp",
    text: "Redirigiendo tu pedido...",
    showConfirmButton: false,
    timer: 1200
  });

  setTimeout(() => {

    window.open(
      `https://wa.me/50584187053?text=${mensaje}`,
      "_blank"
    );

  }, 1200);

}

cargarCarrito();

</script>

</body>

</html>
