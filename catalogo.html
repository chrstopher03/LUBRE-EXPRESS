<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo</title>

<link rel="stylesheet" href="styles.css">
<link rel="icon" href="logo.jpeg">

<!-- ICONOS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

    :root{
--rojo:#c40000;
--rojo2:#8b0000;
--amarillo:#f7c600;
--negro:#111;
--blanco:#fff;
--gris:#f5f5f5;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#fff;
color:#333;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;
width:100%;
height:80px;
padding:0 5%;
background:rgba(196,0,0,.95);
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
}

.logo{
display:flex;
align-items:center;
gap:10px;
color:white;
}

.logo img{
width:55px;
height:55px;
object-fit:cover;
border-radius:50%;
}

nav{
display:flex;
gap:25px;
}

nav a{
color:white;
text-decoration:none;
font-weight:600;
}

.menu-btn{
display:none;
background:none;
border:none;
color:white;
font-size:25px;
}

/* HERO */

.hero{
min-height:100vh;
padding:120px 5% 50px;
background:
linear-gradient(
135deg,
rgba(196,0,0,.92),
rgba(139,0,0,.92)
),
url("img/banner.jpg");

background-size:cover;
background-position:center;

display:grid;
grid-template-columns:1fr 1fr;
align-items:center;
gap:40px;
}

.tag{
background:rgba(255,255,255,.15);
padding:10px 20px;
border-radius:30px;
display:inline-block;
color:white;
margin-bottom:20px;
}

.hero h1{
font-size:4rem;
color:white;
line-height:1.1;
margin-bottom:20px;
}

.hero p{
font-size:18px;
color:white;
line-height:1.7;
margin-bottom:30px;
}

.btn-principal{
background:var(--amarillo);
padding:15px 30px;
border-radius:12px;
text-decoration:none;
font-weight:700;
color:#111;
display:inline-block;
}

.hero-image img{
width:100%;
max-width:600px;
display:block;
margin:auto;
}

/* BENEFICIOS */

.beneficios{
padding:60px 5%;
background:#fff;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.beneficio{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
text-align:center;
}

.beneficio i{
font-size:40px;
color:var(--rojo);
margin-bottom:15px;
}

/* PRODUCTOS */

.catalogo{
padding:80px 5%;
background:var(--gris);
}

.catalogo-header{
margin-bottom:40px;
}

.catalogo-header h2{
font-size:40px;
margin-bottom:20px;
}

.filtros{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.filtros input,
.filtros select{
padding:15px;
border:none;
border-radius:12px;
min-width:250px;
}

.productos{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(280px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}
.modal-img{
display:flex;
justify-content:center;
align-items:center;
background:#fff;
}

.modal-img img{
    min-height:auto;
    height:auto;
    max-height:60vh;
    object-fit:contain;
}
.card-body{
padding:20px;
}

.card-body h3{
margin-bottom:10px;
}

.card-body p{
color:#666;
margin-bottom:15px;
}

.card-body button{
width:100%;
padding:12px;
border:none;
background:var(--rojo);
color:white;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

/* BANNER */

.banner{
padding:120px 5%;
background:
linear-gradient(
rgba(0,0,0,.7),
rgba(0,0,0,.7)
),
url("img/motor.jpg");

background-size:cover;
background-position:center;
color:white;
text-align:center;
}

.banner h2{
font-size:3rem;
margin-bottom:20px;
}

/* FOOTER */

footer{
background:#900000;
color:white;
padding:60px 5%;
}

.footer-grid{
display:grid;
grid-template-columns:2fr 1fr 1fr 1fr;
gap:30px;
}

footer h3{
margin-bottom:20px;
}

footer ul{
list-style:none;
}

footer li{
margin-bottom:10px;
}

footer a{
color:white;
text-decoration:none;
}

.redes{
display:flex;
gap:15px;
font-size:25px;
}

.copy{
margin-top:40px;
padding-top:20px;
border-top:1px solid rgba(255,255,255,.2);
text-align:center;
}
/* MODAL */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
}

.modal-content{
background:white;
width:100%;
max-width:900px;
border-radius:20px;
overflow:hidden;
display:grid;
grid-template-columns:1fr 1fr;
}

.modal-info{
padding:30px;
}

.modal-info h2{
margin-bottom:15px;
}

.modal-info p{
line-height:1.7;
margin-bottom:20px;
}

.cantidad-box{
display:flex;
gap:10px;
margin:20px 0;
align-items:center;
}

.cantidad-box button{
width:40px;
height:40px;
border:none;
background:var(--amarillo);
font-size:20px;
cursor:pointer;
}

.cantidad-box input{
width:80px;
height:40px;
text-align:center;
}

.modal-buttons{
display:flex;
gap:10px;
}

.cerrar{
flex:1;
padding:12px;
border:none;
background:#ddd;
border-radius:10px;
}

.agregar{
flex:1;
padding:12px;
border:none;
background:var(--rojo);
color:white;
border-radius:10px;
}

/* RESPONSIVE MODAL */

@media (max-width:768px){

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:flex-start;
padding:40px 15px 110px;
}

.modal-content{
width:95%;
max-width:420px;
max-height:calc(100vh - 140px);
overflow-y:auto;
border-radius:15px;
margin:auto;
grid-template-columns:1fr;
}

.modal-img img{
max-height:170px;
object-fit:contain;
}

}
/* NAV APP INFERIOR */

body{
padding-bottom:90px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:75px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 20px rgba(0,0,0,.08);
z-index:9999;
border-top:1px solid #eee;
}

.nav-item{
background:none;
border:none;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:4px;
font-size:12px;
color:#666;
cursor:pointer;
width:25%;
height:100%;
transition:.3s;
}

.nav-item i{
font-size:22px;
}

.nav-item.active{
color:var(--rojo);
}

.nav-item:hover{
color:var(--rojo);
}

.cart-icon{
position:relative;
}

.cart-badge{
position:absolute;
top:-10px;
right:-12px;
background:var(--rojo);
color:white;
font-size:11px;
font-weight:700;
padding:3px 7px;
border-radius:50px;
min-width:20px;
text-align:center;
line-height:1.2;
}
/* WHATSAPP */
.whatsapp{
position:fixed;
right:20px;
bottom:95px;
width:65px;
height:65px;
background:#25d366;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:35px;
border-radius:50%;
text-decoration:none;
z-index:999;
box-shadow:0 5px 20px rgba(0,0,0,.2);
}
/* RESPONSIVE */

@media(max-width:768px){

.hero{
grid-template-columns:1fr;
text-align:center;
}

.hero h1{
font-size:2.5rem;
}

nav{
display:none;
}

.menu-btn{
display:block;
}

.modal-content{
grid-template-columns:1fr;
}

footer{
flex-direction:column;
}

}
/* ===== MEJORAS CATALOGO ===== */

.catalogo{
padding:120px 5% 40px;
min-height:100vh;
}

.catalogo-header{
display:flex;
justify-content:space-between;

gap:20px;
flex-wrap:wrap;
}

.catalogo-header h2{
font-size:2rem;
color:var(--rojo);
}

.productos{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:white;

box-shadow:0 10px 25px rgba(0,0,0,.08);
transition:.3s;
display:flex;
flex-direction:column;
height:100%;
}

.card:hover{

box-shadow:0 15px 30px rgba(0,0,0,.15);
}

.card img{
    width:100%;

    background:#f5f5f5;
}
.card-body{

}

}

.btn-ver,

.btn-ver{

}

}

color:white;
}

.btn-cart:hover{

}

/* ===== HERO ===== */

.hero{
min-height:100vh;
padding:120px 5% 80px;
gap:60px;
}

.hero-text{
max-width:650px;
}

.hero h1{
font-size:4.2rem;
}

.hero-image img{
max-width:550px;
filter:drop-shadow(
0 20px 30px rgba(0,0,0,.25)
);
}

/* ===== FILTROS ===== */

display:flex;
gap:15px;
flex-wrap:wrap;
width:100%;
}

.filtros select{

padding:15px;
border-radius:12px;
border:1px solid #ddd;

}

/* ===== MODAL ===== */

.modal-content{
max-height:90vh;
overflow:auto;
}

.modal-img{
background:#f5f5f5;
}

.modal-img img{
width:100%;
height:100%;
min-height:350px;
object-fit:cover;
}

.modal-info h2{
font-size:2rem;
color:var(--rojo);
}

/* ===== FOOTER ===== */

.footer-grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:30px;
}

/* ===== TABLET ===== */

@media(max-width:992px){

.hero{
grid-template-columns:1fr;
text-align:center;
}

.hero-image{
order:-1;
}

.hero h1{

}

.catalogo-header{

}

}

/* ===== MOVIL ===== */

@media(max-width:768px){

/* =========================
   FIX RESPONSIVE GLOBAL
========================= */

/* evita scroll horizontal raro */
body, html {
overflow-x: hidden;
}

/* =========================
   PRODUCTOS CONSISTENTES
========================= */

.productos {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
gap: 20px;
}

/* CARD UNIFICADA */
.card {
display: flex;
flex-direction: column;
height: 100%;
}

.card img {
width: 100%;
height: 220px;
object-fit: contain;
background: #f5f5f5;
}

/* contenido flexible */
.card-body {
display: flex;
flex-direction: column;
flex: 1;
}

/* botones siempre abajo */
.card-buttons {
margin-top: auto;
}

/* =========================
   MODAL RESPONSIVE REAL
========================= */

.modal-content {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 0;
max-height: 90vh;
overflow: hidden;
}

/* imagen centrada bien */
.modal-img {
display: flex;
align-items: center;
justify-content: center;
background: #f5f5f5;
}

.modal-img img {
width: 100%;
height: 100%;
max-height: 60vh;
object-fit: contain;
}

/* =========================
   TABLET
========================= */

@media (max-width: 992px) {

.modal-content {
grid-template-columns: 1fr;
overflow-y: auto;
}

.hero h1 {
font-size: 3rem;
}

}

/* =========================
   MÓVIL PERFECTO
========================= */

@media (max-width: 768px) {

/* catálogo padding correcto */
.catalogo {
padding: 100px 15px 90px;
}

/* filtros en columna */
.filtros {
flex-direction: column;
}

.filtros input,
.filtros select {
width: 100%;
min-width: 100%;
}

/* productos 1 columna limpia */
.productos {
grid-template-columns: 1fr;
}

/* card más compacta */
.card img {
height: 200px;
}

/* botones verticales en móvil */
.card-buttons {
flex-direction: column;
}

/* modal limpio */
.modal-content {
grid-template-columns: 1fr;
height: auto;
}

.modal-info {
padding: 15px;
}

.modal-info h2 {

}

/* bottom nav seguro */

}

}

   MÓVILES PEQUEÑOS
========================= */

height: 180px;
}

.hero h1 {
font-size: 1.8rem;
}

}
</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
<div class="logo">
<img src="logo.jpeg">
<h2>Lubri Express</h2>
</div>

<nav>
<a href="#">Inicio</a>
<a href="#">Catálogo</a>
<a href="#">Contacto</a>
</nav>

<button class="menu-btn">☰</button>
</header>

<!-- CATALOGO -->
<section class="catalogo">

<div class="catalogo-header">
<h2>Catálogo de Productos</h2>

<div class="filtros">
<input type="text" id="buscador" placeholder="Buscar producto...">

<select id="categoria">
<option value="todos">Todas</option>
<option value="motor">Motor</option>
<option value="hidraulico">Hidráulico</option>
<option value="grasa">Grasa</option>
</select>
</div>
</div>

<div id="productos" class="productos"></div>

</section>

<!-- MODAL -->
<div id="modal" class="modal" onclick="cerrarModal(event)">
<div class="modal-content">

<div class="modal-img">
<img id="modalImage">
</div>

<div class="modal-info">
<h2 id="modalNombre"></h2>
<p id="modalDescripcion"></p>

<div class="cantidad-box">
<button onclick="restarCantidad()">-</button>
<input type="number" id="cantidad" value="1">
<button onclick="sumarCantidad()">+</button>
</div>

<div class="modal-buttons">
<button class="cerrar" onclick="cerrarModal()">Cerrar</button>
<button class="agregar" onclick="agregarCarrito()">Agregar</button>
</div>

</div>
</div>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/50584187053" target="_blank">
<i class="fa-brands fa-whatsapp"></i>
</a>


<nav class="bottom-nav">

    <button class="nav-item active"onclick="window.location.href='index.html'">
        <i class="fa-solid fa-house"></i>
        <span>Inicio</span>
    </button>


<button class="nav-item "    
class="nav-item"onclick="window.location.href='catalogo.html'">

<i class="fa fa-box"></i>
<span>Catálogo</span>
</button>

    <button
        class="nav-item"
        onclick="window.location.href='carrito.html'">

        <div class="cart-icon">

            <i class="fa-solid fa-cart-shopping"></i>

            <span
                id="cartCount"
                class="cart-badge">
                0
            </span>

        </div>

        <span>Carrito</span>

    </button>

</nav>
</div>

<script src="funciones.js"></script>

</body>
</html>
